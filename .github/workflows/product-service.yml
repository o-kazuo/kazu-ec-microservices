name: product-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/product/**'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: kazu-ec-dev-product
  ECS_CLUSTER: kazu-ec-dev-cluster
  ECS_SERVICE: kazu-ec-dev-product-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: AWSの認証
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECRにログイン
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivyで脆弱性スキャン
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: services/product
          severity: CRITICAL,HIGH

      - name: Dockerイメージをビルド・プッシュ
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG services/product
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: CodeDeployでデプロイ
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws deploy create-deployment \
            --application-name kazu-ec-dev-product \
            --deployment-group-name kazu-ec-dev-product-dg \
            --deployment-config-name CodeDeployDefault.ECSAllAtOnce \
            --description "Deploy $IMAGE_TAG"
